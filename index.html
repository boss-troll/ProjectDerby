<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PROJECT DERBY</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ========================= -->
<!-- タイトル画面 -->
<!-- ========================= -->

<div id="titleScreen">

    <h1>PROJECT DERBY</h1>

    <h2>競馬シミュレーター</h2>

    <div class="menu">

        <button id="newGameBtn">
            新しいゲーム
        </button>

        <button id="raceBtn">
            単発レース
        </button>

        <button id="optionBtn">
            オプション
        </button>

    </div>

    <p class="version">
        Version 0.5.0
    </p>

</div>

<!-- ========================= -->
<!-- レース設定 -->
<!-- ========================= -->

<div id="raceSetup" style="display:none;">

    <h1>レース設定</h1>

    <p>距離</p>

    <select id="distance">

        <option>1200m</option>
        <option>1400m</option>
        <option>1600m</option>
        <option>1800m</option>
        <option selected>2000m</option>
        <option>2400m</option>
        <option>3200m</option>

    </select>

    <p>天候</p>

    <select id="weather">

        <option>晴</option>
        <option>曇</option>
        <option>雨</option>

    </select>

    <p>馬場</p>

    <select id="ground">

        <option>良</option>
        <option>稍重</option>
        <option>重</option>
        <option>不良</option>

    </select>

    <p>出走頭数</p>

    <select id="horseCount">

        <option>8</option>
        <option>10</option>
        <option selected>12</option>
        <option>14</option>
        <option>16</option>
        <option>18</option>

    </select>

    <br><br>

    <button id="startRaceBtn">

        出走馬を見る

    </button>

    <button id="backBtn">

        戻る

    </button>

</div>

<!-- ========================= -->
<!-- 出走馬一覧 -->
<!-- ========================= -->

<div id="horseListScreen" style="display:none;">

    <h1>出走馬一覧</h1>

    <div id="horseList"></div>

    <br>

    <button id="raceStart">

        レース開始

    </button>

    <button id="horseBackBtn">

        戻る

    </button>

</div>

<!-- ========================= -->
<!-- 馬詳細 -->
<!-- ========================= -->

<div id="horseDetailScreen" style="display:none;">

    <h1 id="horseName"></h1>

    <p id="horseSpeed"></p>

    <p id="horseStamina"></p>

    <p id="horseSprint"></p>

    <br>

    <button id="detailBackBtn">

        戻る

    </button>

</div>

<!-- ========================= -->
<!-- レース画面 -->
<!-- ========================= -->

<div id="raceScreen" style="display:none;">

    <h1>🏇 レース実況</h1>

    <hr>

    <h2 id="raceDistance"></h2>

    <p id="raceInfo"></p>

    <hr>

    <h3>実況</h3>

    <div id="commentary"></div>

    <hr>

    <h3>順位</h3>

    <div id="ranking"></div>

</div>

<!-- ========================= -->
<!-- Derby News -->
<!-- ========================= -->

<div id="newsScreen" style="display:none;">

    <h1>📰 DERBY NEWS</h1>

    <div id="newsList">

        <div class="newsCard">

            <h2>本日のトップニュース</h2>

            <p>
                PROJECT DERBYへようこそ。
                今日も新たなドラマが始まります。
            </p>

        </div>

    </div>

    <br>

    <button id="newsBackBtn">
        タイトルへ戻る
    </button>

</div>
  
<script src="js/horses.js"></script>
<script src="js/race.js"></script>
<script src="js/news.js"></script>
<script src="js/main.js"></script>

</body>
</html>
